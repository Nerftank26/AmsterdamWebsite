<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | The Amsterdam Local</title>
    <link rel="stylesheet" href="style.css">
    
</head>

<body>

    <div class="nav-overlay" id="navOverlay"></div>

    <header class="site-header" id="siteHeader">
        <a href="/" class="logo">
            <span class="logo-the">The Local</span>
            <span class="logo-main">Amsterdam</span>
        </a>
        <a href="/" class="nav-link return-link">← Return to Site</a>
    </header>

    <div class="login-container">
        <div class="login-card">

            <div class="leaf-accent">🌿</div>

            <div class="brand-identity">
                <p class="brand-label">Staff Portal</p>
                <p class="brand-name">Amsterdam</p>
            </div>

            <p class="restricted-notice">Authorized Personnel Only.</p>

            <div class="role-tab-selector">
                <button class="menu-tab active" id="tabAdmin" onclick="switchLoginRole('admin')">
                    Admin
                </button>
                <button class="menu-tab" id="tabStaff" onclick="switchLoginRole('staff')">
                    Staff
                </button>
            </div>

            <p id="loginRoleHint" class="role-hint">
                Sign in with your administrator credentials.
            </p>

            <form id="loginForm" action="#" method="post" class="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">Username or Employee ID</label>
                    <input type="text" class="form-input" id="username" name="username"
                           placeholder="Enter username" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="form-input" id="password" name="password"
                           placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div class="remember-me-container">
                    <input type="checkbox" id="rememberMe" name="rememberMe" class="remember-me-checkbox">
                    <label for="rememberMe" class="remember-me-label">Keep me signed in</label>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>

            <div class="footer-links">
                <a href="#">Forgot password?</a>
                <span class="footer-separator">·</span>
                <a href="/contact/">Need Help?</a>
            </div>
        </div>
    </div>

    <footer class="site-footer"></footer>

    <script src="/supabase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
